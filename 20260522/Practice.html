<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>MindAR 音樂影片播放</title>

    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #hint {
            position: fixed;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="hint">請掃描 gem 圖片</div>

    <a-scene
        mindar-image="imageTargetSrc: gem.mind; autoStart: true; uiScanning: true; uiLoading: true; uiError: true;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
    >
        <a-assets>
            <video
                id="skyVideo"
                src="sky.mp4"
                preload="auto"
                loop
                playsinline
                webkit-playsinline>
            </video>
        </a-assets>

        <a-camera
            position="0 0 0"
            look-controls="enabled: false">
        </a-camera>

        <a-light type="ambient" intensity="1.5"></a-light>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video
                id="videoPlane"
                src="#skyVideo"
                width="1"
                height="0.6"
                position="0 0 0"
                rotation="0 0 0"
                material="shader: flat">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.getElementById('skyVideo');
        const target = document.getElementById('target');
        const hint = document.getElementById('hint');

        let found = false;

        video.muted = false;
        video.volume = 1.0;

        target.addEventListener('targetFound', function () {
            found = true;
            hint.style.display = 'block';
            hint.innerHTML = '掃描成功<br>請點一下畫面播放音樂影片';
        });

        target.addEventListener('targetLost', function () {
            found = false;
            video.pause();
            video.currentTime = 0;
            hint.style.display = 'block';
            hint.innerHTML = '請重新掃描 gem 圖片';
        });

        document.body.addEventListener('click', function () {
            if (!found) {
                hint.style.display = 'block';
                hint.innerHTML = '請先掃描 gem 圖片';
                return;
            }

            video.muted = false;
            video.volume = 1.0;

            video.play()
                .then(function () {
                    hint.style.display = 'none';
                })
                .catch(function () {
                    hint.style.display = 'block';
                    hint.innerHTML = '影片無法播放<br>請確認 sky.mp4 已上傳到 GitHub';
                });
        });
    </script>
</body>
</html>
